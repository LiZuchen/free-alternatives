            border-radius: 10px;
            backdrop-filter: blur(10px);

        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .search-box {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #999;
        }
        
        /* Category Tabs */
        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 20px auto 0;
            padding: 0 20px;
        }
        .category-tab {

            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;

        .category-tab:hover {

        }
        .category-tab.active {

            margin: 0 auto;
            padding: 40px 20px;
        }

            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .software-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .software-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        .card-header {

            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-bottom: 3px solid #667eea;
        }
        .software-names {

            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;

        .paid-name {

        .vs {

            font-weight: bold;
        }
        .free-name {
            font-size: 20px;
            font-weight: bold;
            color: #27ae60;
        }
        .price-tag {

            font-size: 13px;
            font-weight: 600;
        }
        .price-paid {
            background: #ffeaea;
            color: #e74c3c;
        }
        .price-free {
            background: #eaffea;
            color: #27ae60;
        }
        .card-body {
            padding: 20px;
        }
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        .comparison-table td {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .comparison-table tr:last-child td {

        }
        .feature-name {

        .cross { color: #e74c3c; }

            padding: 12px;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
            display: inline-block;
        }

            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        }
        .btn-secondary {

            color: #333;

        /* Footer */

        /* Responsive */

            .stat-item { padding: 10px 20px; }
        }
        
        /* Hidden */
        .hidden { display: none; }
    </style>
</head>

                                    <td>${f.paid ? '<span class="check">✓</span>' : '<span class="cross">✗</span>'}</td>

        searchInput.addEventListener('input', (e) => {

            const filtered = softwareData.filter(item => 
                item.paid.toLowerCase().includes(query) ||
                item.free.toLowerCase().includes(query) ||
                item.category.toLowerCase().includes(query)
            );
            renderCards(filtered);
        });

        // Category filter
        categoryTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                categoryTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const category = tab.dataset.category;
                if (category === 'all') {
                    renderCards(softwareData);
                } else {
                    const filtered = softwareData.filter(item => item.category === category);
                    renderCards(filtered);
                }
